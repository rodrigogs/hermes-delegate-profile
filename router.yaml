# router.yaml — the sole policy source, beside delegate_profile.
# v2 — cost×benefit tiers from the 176-model enriched+benchmarked roster (2026-07-22).
# Scoring: overall = 0.45*coding + 0.35*planning + 0.20*reasoning.
# Every tier picks the CHEAPEST model that clears the tier's capability bar, and
# every tier crosses rails so no single provider outage strands it.
# Rails: openai-codex / deepseek / zai / xiaomi (own paid creds) · bedrock = Claude
# Code via the Mac gate (paid, reliable, BUT can be off-LAN → never the sole option).

enabled: true

classifier:
  # cheap, fast, verified+measured judge on a distinct rail from the flagships
  model: deepseek-v3.2
  provider: deepseek
  temperature: 0
  max_tokens: 128
  timeout_seconds: 8

fail_safe:
  # strong, always-on last resort. Claude Code (Bedrock) is the strong anchor,
  # but it can be off-LAN — the adapter must fall back to deepseek-v4-pro (other rail).
  profile: coder
  model: us.anthropic.claude-opus-4-8
  provider: bedrock
  fallback:
    - { model: deepseek-v4-pro, provider: deepseek }   # non-Mac strong-value coder
    - { model: glm-5.2,         provider: zai }          # own-cred backup

blocklist:
  # No permanent model ban. gpt-5.6-sol stalls only intermittently under load;
  # the auto-breaker cools it dynamically instead of a static deny that would
  # forfeit the top coder entirely.
  manual_ban: []
  fallback_chain: [gpt-5.6-terra, deepseek-v4-pro, glm-5.2]
  auto_breaker:
    enabled: true
    threshold: 5
    window_seconds: 600
    base_cooldown_seconds: 60
    max_cooldown_seconds: 900
    backoff_multiplier: 2.0

rules:
  - id: trivial-mechanical-edit
    status: stable
    when: { verb_class: { eq: trivial }, has_code: { eq: true }, size_lines: { lte: 40 } }
    then: { profile: coder, model: T1 }        # cheapest tier, no classifier

  - id: hard-verbs
    status: stable
    when: { verb_class: { eq: hard } }
    then: { profile: coder, model: T4 }        # fail toward capability

  - id: review-request
    status: stable
    when: { keywords: { contains: review } }
    then: { profile: reviewer, action: classify }

default: { action: classify }                  # hybrid switch

# tiers — cheapest model clearing the bar; T4 crosses to a Bedrock fallback.
# All primaries are verified+measured except where noted.
tiers:
  T1: { model: deepseek-v3.2, provider: deepseek }      # 78/68 coding/plan, $0.21/$0.32 — cheap floor
  T2: { model: deepseek-v4-pro, provider: deepseek }    # 89/82, $0.435/$0.87 — best value coder
  T3: { model: glm-5.2, provider: zai }                 # 86/87, $0.79/$2.50 — own-cred strong
  T4:
    model: gpt-5.6-terra                                # 94/94, $2.50/$15 — top value at the ceiling
    provider: openai-codex
    fallback:
      - { model: us.anthropic.claude-opus-4-8, provider: bedrock }  # strong, other rail (Claude Code)
      - { model: deepseek-v4-pro, provider: deepseek }              # non-Mac guarantee
