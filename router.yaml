enabled: true
classifier:
  model: glm-4.5-flash
  provider: zai
  temperature: 0
  max_tokens: 128
  timeout_seconds: 8
fail_safe:
  profile: coder
  model: gpt-5.6-terra
  provider: openai-codex
  fallback:
  - model: glm-4.5-flash
    provider: zai
  - model: deepseek-v4-pro
    provider: deepseek
blocklist:
  manual_ban: []
  fallback_chain:
  - gpt-5.6-terra
  - glm-5.2
  - glm-4.5-flash
  auto_breaker:
    enabled: true
    threshold: 5
    window_seconds: 600
    base_cooldown_seconds: 60
    max_cooldown_seconds: 900
    backoff_multiplier: 2.0
rules:
- id: trivial-mechanical-edit
  status: stable
  when:
    verb_class:
      eq: trivial
    has_code:
      eq: true
    size_lines:
      lte: 40
  then:
    profile: coder
    model: T1
- id: hard-verbs
  status: stable
  when:
    verb_class:
      eq: hard
  then:
    profile: coder
    model: T4
- id: review-request
  status: stable
  when:
    keywords:
      contains: review
  then:
    profile: reviewer
    action: classify
default:
  action: classify
tiers:
  T1:
    model: glm-4.5-flash
    provider: zai
  T2:
    model: glm-4.7
    provider: zai
  T3:
    model: gpt-5.6-terra
    provider: openai-codex
    fallback:
    - model: glm-4.5-flash
      provider: zai
    - model: deepseek-v4-pro
      provider: deepseek
  T4:
    model: gpt-5.6-terra
    provider: openai-codex
    fallback:
    - model: glm-4.5-flash
      provider: zai
    - model: deepseek-v4-pro
      provider: deepseek
